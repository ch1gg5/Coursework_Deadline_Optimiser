<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card" style="max-width: 400px; margin: 100px auto; padding: 2rem;">
    <h2>Login</h2>
    <div id="error-msg" style="color: red; display: none;"></div>

    <div>
        <label>Username</label>
        <input type="text" id="username" placeholder="Username" style="width:100%; margin-bottom: 1rem;">
    </div>
    <div>
        <label>Password</label>
        <input type="password" id="password" placeholder="Password" style="width:100%; margin-bottom: 1rem;">
    </div>

    <button class="btn" onclick="login()">Login</button>
    <p>Don't have an account? <a href="/register.html">Register</a></p>
</div>

<script>
    // If already logged in, redirect to app
    if (localStorage.getItem('jwt_token')) {
        window.location.href = '/index.html';
    }

    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const errorMsg = document.getElementById('error-msg');
        errorMsg.style.display = 'none';

        try {
            const res = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (!res.ok) {
                errorMsg.textContent = 'Invalid username or password';
                errorMsg.style.display = 'block';
                return;
            }

            const token = await res.text();
            localStorage.setItem('jwt_token', token);
            window.location.href = '/index.html';

        } catch (err) {
            errorMsg.textContent = 'Something went wrong, try again';
            errorMsg.style.display = 'block';
        }
    }
</script>
</body>
</html>
