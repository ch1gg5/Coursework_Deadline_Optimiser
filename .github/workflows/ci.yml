name: CI Build

on:
  push:
    branches: [ "with-front-end" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 26

      - name: Build
        run: ./mvnw clean package -DskipTests
